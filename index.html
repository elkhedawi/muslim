        }

        function handleSearch(value) { state.searchQuery = value; const filtered = SURAH_META.filter(s => s.name.includes(value)); document.getElementById('surah-grid').innerHTML = generateSurahGrid(filtered); lucide.createIcons(); }
        function generateSurahGrid(surahs) { return surahs.map(s => { const isCached = state.downloadedSurahs.includes(s.id); return `<div onclick="openSurah(${s.id})" class="bg-card p-4 rounded-2xl shadow-sm hover:shadow-lg cursor-pointer border border-transparent hover:border-gold/30 transition-all flex items-center justify-between group transform hover:-translate-y-1"><div class="flex items-center gap-4"><div class="relative w-12 h-12 flex items-center justify-center"><svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full fill-current text-gold/30 group-hover:text-gold/50 transition-colors"><path d="M50 0 L61 35 L98 35 L68 57 L79 91 L50 70 L21 91 L32 57 L2 35 L39 35 Z" /></svg><span class="relative font-bold text-gold text-sm z-10">${s.id}</span></div><div><h3 class="font-bold text-lg text-gray-100 group-hover:text-gold transition-colors">سورة ${s.name}</h3><div class="flex items-center gap-2"><p class="text-xs text-warm/60">${s.type} • ${s.count} آية</p>${isCached ? `<span class="flex items-center gap-1 text-[10px] bg-gold/20 text-gold px-1.5 py-0.5 rounded-full font-bold"><i data-lucide="check" class="w-3 h-3"></i> متاح</span>` : ''}</div></div></div>${isCached ? '<i data-lucide="check" class="w-5 h-5 text-gold"></i>' : '<i data-lucide="book-open" class="w-5 h-5 text-warm/40 group-hover:text-gold transition-colors"></i>'}</div>`; }).join(''); }
        function renderQuranIndex() { const filtered = SURAH_META.filter(s => s.name.includes(state.searchQuery)); const gridHtml = generateSurahGrid(filtered); return `<div class="animate-fade-in pb-20"><div class="mb-8 relative group"><i data-lucide="search" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-warm/60 w-5 h-5"></i><input type="text" placeholder="ابحث باسم السورة..." value="${state.searchQuery}" oninput="handleSearch(this.value)" class="w-full pr-12 pl-4 py-4 rounded-2xl border-none bg-card shadow-sm focus:shadow-lg focus:ring-2 focus:ring-gold transition-all outline-none font-bold text-gray-200"/></div><div id="surah-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${gridHtml}</div></div>`; }
        function renderQuranReaderStub() { return `<div class="animate-fade-in pb-20"><div class="sticky top-0 z-20 bg-deep/80 backdrop-blur-md py-4 mb-6 flex justify-between items-center border-b border-gold/30 transition-colors"><button onclick="switchTab('quran')" class="flex items-center gap-2 text-gold hover:bg-gold/20 px-4 py-2 rounded-xl transition-all"><i data-lucide="arrow-right" class="w-5 h-5"></i><span class="font-bold">الفهرس</span></button><div class="text-center"><h2 class="font-bold text-lg text-gray-100">سورة ${state.selectedSurah.name}</h2><span class="text-xs text-warm/60">${state.selectedSurah.type} • ${state.selectedSurah.count} آية</span></div><div id="download-controls"></div></div><div class="bg-card rounded-[4px] shadow-2xl border-l-4 border-r-2 border-gold/30 max-w-3xl mx-auto min-h-[90vh] relative overflow-hidden transition-colors"><div class="absolute inset-0 opacity-20 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/cream-paper.png')] mix-blend-overlay"></div><div class="relative z-10 p-6 md:p-12 text-center" id="quran-container"><div class="py-20 flex flex-col items-center justify-center space-y-4"><div class="w-10 h-10 border-4 border-gold border-t-transparent rounded-full animate-spin"></div><p class="text-warm/60">جاري تحميل الآيات...</p></div></div></div></div>`; }
        function renderQuranContent() { const container = document.getElementById('quran-container'); const controls = document.getElementById('download-controls'); if (!container) return; const isDownloaded = state.downloadedSurahs.includes(state.selectedSurah.id); if (controls) { if (isDownloaded) { controls.innerHTML = `<button onclick="deleteSurah()" class="flex items-center gap-2 text-gold bg-gold/20 px-3 py-2 rounded-xl text-xs font-bold hover:bg-warm/20 hover:text-warm transition-colors"><i data-lucide="check" class="w-4 h-4"></i> <span class="hidden sm:inline">نص محفوظ</span></button>`; } else { controls.innerHTML = `<button onclick="downloadSurah()" class="flex items-center gap-2 text-gray-300 bg-card px-3 py-2 rounded-xl text-xs font-bold hover:bg-gold hover:text-deep transition-colors"><i data-lucide="download" class="w-4 h-4"></i> <span class="hidden sm:inline">حفظ النص</span></button>`; } } let html = ''; if (state.selectedSurah.id !== 9) { html += `<div class="mb-10 relative"><img src="https://upload.wikimedia.org/wikipedia/commons/2/27/Basmala.svg" alt="Bismillah" class="h-12 md:h-14 mx-auto opacity-80 invert-[0.8] sepia" /></div>`; } html += `<div class="space-y-6 leading-[3]">`; state.quranVerses.forEach((ayah, index) => { let text = ayah.text; if (state.selectedSurah.id === 1 && index === 0) text = text.replace("بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ ", ""); if (index === 0 && state.selectedSurah.id !== 1 && text.startsWith("بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ")) { text = text.replace("بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ", "").trim(); } html += `<span class="inline text-2xl md:text-3xl text-gray-100 font-quran">${text} <span class="inline-flex items-center justify-center mx-1 text-gold number-symbol select-none transform translate-y-2 text-base pt-1">${ayah.numberInSurah}</span></span>`; }); html += `</div><div class="mt-16 pt-8 border-t border-gold/20 flex justify-center"><div class="w-16 h-1 bg-gold/30 rounded-full"></div></div>`; container.innerHTML = html; lucide.createIcons(); }
        function renderPrayerTimesStub() { return `<div class="animate-fade-in pb-20"><h2 class="text-2xl font-bold text-gray-100 mb-6 border-r-4 border-gold pr-4">مواقيت الصلاة</h2><div id="prayer-content" class="min-h-[300px] flex items-center justify-center"><div class="w-10 h-10 border-4 border-gold border-t-transparent rounded-full animate-spin"></div></div></div>`; }
        async function fetchPrayerTimes() { try { const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${state.prayerCity}&country=${state.prayerCountry}&method=5`); const data = await response.json(); if (data.code === 200) { state.prayerTimes = data.data; renderPrayerTimesContent(); } else { document.getElementById('prayer-content').innerHTML = '<p class="text-warm">حدث خطأ في جلب البيانات</p>'; } } catch (e) { console.error(e); const content = document.getElementById('prayer-content'); if(content) content.innerHTML = '<p class="text-warm">تأكد من اتصال الإنترنت</p>'; } }
        function renderPrayerTimesContent() { const content = document.getElementById('prayer-content'); if (!content || !state.prayerTimes) return; const timings = state.prayerTimes.timings; const hijriMap = state.prayerTimes.date.hijri; const dateStr = `${hijriMap.weekday.ar} ${hijriMap.day} ${hijriMap.month.ar} ${hijriMap.year}`; const prayers = [{ name: 'الفجر', time: timings.Fajr, icon: 'sunrise' }, { name: 'الشروق', time: timings.Sunrise, icon: 'sun' }, { name: 'الظهر', time: timings.Dhuhr, icon: 'sun' }, { name: 'العصر', time: timings.Asr, icon: 'cloud-sun' }, { name: 'المغرب', time: timings.Maghrib, icon: 'sunset' }, { name: 'العشاء', time: timings.Isha, icon: 'moon' }]; content.innerHTML = `<div class="w-full space-y-6"><div class="bg-gradient-to-br from-gold to-warm rounded-3xl p-6 text-deep text-center shadow-lg relative overflow-hidden"><div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/arabesque.png')] opacity-10"></div><h3 class="text-2xl font-bold font-quran mb-2">${state.prayerCity}</h3><p class="opacity-90 font-ui">${dateStr}</p></div><div class="grid gap-4">${prayers.map(p => `<div class="bg-card p-4 rounded-2xl flex items-center justify-between border border-gold/30 hover:border-gold/60 transition-all group"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-full bg-gold/20 flex items-center justify-center text-gold group-hover:bg-gold group-hover:text-deep transition-colors"><i data-lucide="${p.icon}" class="w-5 h-5"></i></div><span class="font-bold text-lg text-gray-200">${p.name}</span></div><span class="font-mono text-xl font-bold text-gold">${p.time}</span></div>`).join('')}</div></div>`; lucide.createIcons(); }
    </script>
</body>
</html>
